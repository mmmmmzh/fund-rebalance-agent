name: 功能建议
description: 提议通用的软件工程或研究工作流改进
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请描述通用研究需求，不要提交真实持仓、账户身份、付费荐基需求或自动交易需求。
  - type: textarea
    id: problem
    attributes:
      label: 通用问题
      description: 说明要解决的软件或研究流程问题。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: 边界确认
      options:
        - label: 该建议不要求连接交易账户或自动执行交易。
          required: true
        - label: 该建议不包含个人信息、真实持仓、密钥或受限数据。
          required: true
        - label: 该建议不把研究标签包装成投资建议或收益承诺。
          required: true

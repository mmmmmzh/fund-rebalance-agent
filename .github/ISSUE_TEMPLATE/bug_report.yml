name: Bug 报告
description: 使用合成或最小化数据报告可复现的软件问题
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请勿上传账户截图、真实持仓、姓名、联系方式、账号、身份证件、银行卡、Cookie、API key 或未经授权的第三方数据。优先使用仓库合成数据复现。
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: v0.1.0 或提交 SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 运行环境
      placeholder: Windows 11, Python 3.11
    validations:
      required: true
  - type: dropdown
    id: data_mode
    attributes:
      label: 数据模式
      options:
        - 仓库合成数据
        - 已去标识的本地 CSV
        - 自行安装的插件
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 最小复现步骤
      description: 使用合成值和通用路径描述问题，不要粘贴真实金融数据。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期与实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 已清理日志
      description: 粘贴前删除本机用户名、绝对路径、令牌、身份字段和真实持仓。
      render: shell
  - type: checkboxes
    id: confirmations
    attributes:
      label: 提交确认
      options:
        - label: 我已确认内容不含账户、身份、真实持仓、密钥或未经授权的数据。
          required: true
        - label: 我理解本项目是研究软件，Issue 不用于请求个性化投资建议。
          required: true
